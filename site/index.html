<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#07101f">
<title>PSG v Arsenal · Pick'em</title>
<style>
  :root{
    --bg:#07101f; --card:#0f243f; --line:#1d3a5c;
    --gold:#c8a24b; --goldlt:#e6c878; --txt:#eaf1fb; --mut:#8ba6c6;
    --psg:#0a3d6e; --ars:#ef0107;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--txt);background:
    radial-gradient(1200px 600px at 50% -10%, #15355c 0%, rgba(21,53,92,0) 60%),
    linear-gradient(180deg,#0a1a2f 0%, var(--bg) 100%);min-height:100vh;}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 140px}
  header{text-align:center;padding:10px 6px 4px}
  .comp{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700}
  .vs{display:flex;align-items:center;justify-content:center;gap:14px;margin:12px 0 6px}
  .team{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1}
  .crest{width:58px;height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:20px;letter-spacing:.04em;color:#fff;box-shadow:0 6px 18px rgba(0,0,0,.35)}
  .crest.psg{background:linear-gradient(135deg,var(--psg),#06294c);border:1px solid #1c5790}
  .crest.ars{background:linear-gradient(135deg,var(--ars),#b00005);border:1px solid #ff5a5e}
  .tname{font-weight:700;font-size:14px}
  .vstxt{font-size:13px;color:var(--mut);font-weight:700;padding-top:6px}
  .meta{color:var(--mut);font-size:13px;margin-top:2px}
  .who{background:linear-gradient(180deg,var(--card),#0c1d34);border:1px solid var(--line);
    border-radius:16px;padding:16px;margin:18px 0}
  .who label{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);font-weight:700}
  .chips{display:flex;gap:8px;margin:10px 0}
  .chip{flex:1;padding:11px;border-radius:11px;border:1px solid var(--line);background:#0a1c33;color:var(--txt);
    font-weight:700;font-size:15px;cursor:pointer}
  .chip.on{background:linear-gradient(135deg,var(--gold),var(--goldlt));color:#1a1205;border-color:var(--goldlt)}
  .who input{width:100%;margin-top:4px;padding:12px;border-radius:11px;border:1px solid var(--line);
    background:#0a1c33;color:var(--txt);font-size:15px}
  .who input::placeholder{color:#5f7a9a}
  .card{background:linear-gradient(180deg,var(--card),#0c1d34);border:1px solid var(--line);
    border-radius:16px;padding:15px 15px 14px;margin:12px 0;transition:border-color .2s}
  .card.done{border-color:var(--gold)}
  .card-head{display:flex;align-items:center;gap:11px}
  .num{flex:none;width:27px;height:27px;border-radius:50%;background:#0a1c33;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--gold)}
  .card-head h3{margin:0;font-size:16px;font-weight:700;line-height:1.25}
  .blurb{margin:8px 0 0;color:var(--mut);font-size:13px;line-height:1.4}
  .opts{display:flex;gap:9px;margin-top:12px}
  .opt{flex:1;padding:14px 8px;border-radius:12px;border:1.5px solid var(--line);background:#0a1c33;
    color:var(--txt);font-weight:700;font-size:15px;cursor:pointer;transition:all .15s}
  .opt:active{transform:scale(.98)}
  .opt.on{background:linear-gradient(135deg,var(--gold),var(--goldlt));color:#1a1205;border-color:var(--goldlt);
    box-shadow:0 6px 16px rgba(200,162,75,.25)}
  .bar{position:fixed;left:0;right:0;bottom:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,rgba(7,16,31,0),#07101f 38%);}
  .barin{max-width:560px;margin:0 auto}
  .prog{text-align:center;font-size:13px;color:var(--mut);margin-bottom:8px;font-weight:600}
  .submit{width:100%;padding:16px;border-radius:14px;border:none;font-size:16px;font-weight:800;
    background:linear-gradient(135deg,var(--gold),var(--goldlt));color:#1a1205;cursor:pointer}
  .submit:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(.4)}
  .done-screen{text-align:center;padding:40px 10px}
  .done-screen .tick{font-size:54px}
  .done-screen h2{margin:10px 0 6px}
  .done-screen p{color:var(--mut)}
  .summary{text-align:left;margin:18px auto 0;max-width:420px}
  .srow{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .srow span:first-child{color:var(--mut)}
  .srow b{color:var(--goldlt)}
  .err{color:#ff8a8a;text-align:center;font-size:14px;margin-top:8px;min-height:18px}
  a.link{display:block;text-align:center;color:var(--mut);font-size:12px;margin-top:18px;text-decoration:none}
  .loading{text-align:center;color:var(--mut);padding:60px 0}
  /* results */
  .tally{max-width:380px;margin:14px auto 22px}
  .tline{display:flex;justify-content:space-between;padding:11px 14px;border:1px solid var(--line);border-radius:11px;margin:7px 0;background:var(--card);font-weight:700}
  .tline.lead{border-color:var(--gold);background:linear-gradient(135deg,#15294a,#0f243f)}
  .tline b{color:var(--goldlt)}
  .note{text-align:center;color:var(--mut);font-size:14px}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
  th,td{padding:9px 8px;text-align:center;border-bottom:1px solid var(--line)}
  th{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
  td.bet{text-align:left;color:#cdddf2;max-width:220px}
  td.bet b{color:var(--gold)}
  td.right{color:#7ee0a3;font-weight:800}
  td.wrong{color:#ff8a8a}
  td.res{color:var(--goldlt);font-weight:800}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">Loading…</div>
</div>

<script>
  const API = "https://ybwamkukfhwtwnekyyfk.supabase.co/functions/v1/pickem";
  const params = new URLSearchParams(location.search);
  const SLUG = params.get("match") || "psg-arsenal-2026";
  const app = document.getElementById("app");
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) =>
    ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

  function kickoffLabel(iso){
    if(!iso) return "";
    try{
      const d = new Date(iso);
      const t = d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/London"});
      const day = d.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",timeZone:"Europe/London"});
      return day + " · " + t + " BST";
    }catch(e){ return ""; }
  }

  async function api(path){
    const r = await fetch(API + path, { headers: { "accept":"application/json" } });
    return r.json();
  }

  // ---------- FORM ----------
  async function renderForm(){
    let data;
    try{ data = await api("?match=" + encodeURIComponent(SLUG)); }
    catch(e){ app.innerHTML = '<p class="note">Could not load. Check your connection and refresh.</p>'; return; }
    if(!data || !data.match){ app.innerHTML = '<p class="note">Match not found.</p>'; return; }
    const m = data.match, bets = data.bets || [];
    const TOTAL = bets.length;
    const picks = {}; let name = "";

    const cards = bets.map((b) => `
      <div class="card" data-n="${b.n}">
        <div class="card-head"><span class="num">${b.n}</span><h3>${esc(b.title)}</h3></div>
        ${b.blurb ? `<p class="blurb">${esc(b.blurb)}</p>` : ""}
        <div class="opts">
          <button type="button" class="opt" data-n="${b.n}" data-c="A">${esc(b.opt_a)}</button>
          <button type="button" class="opt" data-n="${b.n}" data-c="B">${esc(b.opt_b)}</button>
        </div>
      </div>`).join("");

    app.innerHTML = `
      <div id="form">
        <header>
          <div class="comp">${esc(m.competition)}</div>
          <div class="vs">
            <div class="team"><div class="crest psg">PSG</div><div class="tname">${esc(m.home)}</div></div>
            <div class="vstxt">v</div>
            <div class="team"><div class="crest ars">ARS</div><div class="tname">${esc(m.away)}</div></div>
          </div>
          <div class="meta">${esc(m.venue)}</div>
          <div class="meta">${esc(kickoffLabel(m.kickoff))}</div>
        </header>
        <div class="who">
          <label>Who's picking?</label>
          <div class="chips">
            <button type="button" class="chip" data-name="Rob">Rob</button>
            <button type="button" class="chip" data-name="Marcus">Marcus</button>
          </div>
          <input id="name" placeholder="…or type your name" autocomplete="off">
        </div>
        ${cards}
        <a class="link" href="?view=results&match=${esc(SLUG)}">View results →</a>
      </div>
      <div id="done" class="done-screen" style="display:none">
        <div class="tick">🏆</div>
        <h2>Picks locked in</h2>
        <p id="doneby"></p>
        <div class="summary" id="summary"></div>
        <a class="link" href="?view=results&match=${esc(SLUG)}">See everyone's picks →</a>
      </div>
      <div class="bar" id="bar">
        <div class="barin">
          <div class="prog" id="prog">0 of ${TOTAL} picked</div>
          <div class="err" id="err"></div>
          <button class="submit" id="submit" disabled>Lock in my picks</button>
        </div>
      </div>`;

    const $ = (s) => document.querySelector(s);
    const prog = $("#prog"), submit = $("#submit"), err = $("#err");
    const refresh = () => {
      const c = Object.keys(picks).length;
      prog.textContent = c + " of " + TOTAL + " picked";
      submit.disabled = !(c === TOTAL && name.trim());
    };

    document.querySelectorAll(".opt").forEach((btn) => btn.addEventListener("click", () => {
      const n = btn.dataset.n, c = btn.dataset.c;
      picks[n] = c;
      const card = document.querySelector('.card[data-n="' + n + '"]');
      card.querySelectorAll(".opt").forEach((o) => o.classList.toggle("on", o.dataset.c === c));
      card.classList.add("done");
      refresh();
    }));
    document.querySelectorAll(".chip").forEach((chip) => chip.addEventListener("click", () => {
      document.querySelectorAll(".chip").forEach((c) => c.classList.remove("on"));
      chip.classList.add("on"); name = chip.dataset.name; $("#name").value = ""; refresh();
    }));
    $("#name").addEventListener("input", (e) => {
      name = e.target.value;
      document.querySelectorAll(".chip").forEach((c) => c.classList.remove("on"));
      refresh();
    });

    submit.addEventListener("click", async () => {
      submit.disabled = true; err.textContent = ""; submit.textContent = "Saving…";
      try{
        const r = await fetch(API, {
          method:"POST", headers:{ "content-type":"application/json" },
          body: JSON.stringify({ match: SLUG, player: name.trim(), picks })
        });
        const j = await r.json();
        if(!j.ok) throw new Error(j.error || "Something went wrong");
        $("#form").style.display = "none"; $("#bar").style.display = "none";
        $("#doneby").textContent = name.trim() + " · " + TOTAL + " picks in";
        $("#summary").innerHTML = bets.map((b) => {
          const choice = picks[b.n] === "A" ? b.opt_a : b.opt_b;
          return '<div class="srow"><span>' + b.n + '. ' + esc(b.title) + '</span><b>' + esc(choice) + '</b></div>';
        }).join("");
        $("#done").style.display = "block";
        window.scrollTo(0,0);
      }catch(e){
        err.textContent = e.message; submit.disabled = false; submit.textContent = "Lock in my picks";
      }
    });
    refresh();
  }

  // ---------- RESULTS ----------
  async function renderResults(){
    let data;
    try{ data = await api("?view=results&match=" + encodeURIComponent(SLUG)); }
    catch(e){ app.innerHTML = '<p class="note">Could not load results.</p>'; return; }
    if(!data || !data.match){ app.innerHTML = '<p class="note">Match not found.</p>'; return; }
    const m = data.match, bets = data.bets || [], entries = data.entries || [];
    const settled = bets.some((b) => b.correct);
    const label = (b, c) => c === "A" ? b.opt_a : c === "B" ? b.opt_b : "—";
    const score = (e) => bets.reduce((a, b) => a + (b.correct && e.picks && e.picks[b.n] === b.correct ? 1 : 0), 0);
    const standings = entries.slice().sort((a, b) => score(b) - score(a));

    let body;
    if(entries.length === 0){
      body = '<p class="note">No picks submitted yet.</p>';
    } else {
      const tally = settled
        ? '<div class="tally">' + standings.map((e, i) =>
            '<div class="tline ' + (i===0?'lead':'') + '"><span>' + (i===0?'👑 ':'') + esc(e.player) + '</span><b>' + score(e) + '/' + bets.length + '</b></div>').join("") + '</div>'
        : '<p class="note">No results graded yet. Standings appear here once the match is settled.</p>';
      const head = '<tr><th>Bet</th>' + entries.map((e) => '<th>' + esc(e.player) + '</th>').join("") + (settled ? '<th>Result</th>' : '') + '</tr>';
      const rows = bets.map((b) => {
        const cells = entries.map((e) => {
          const c = e.picks ? e.picks[b.n] : null;
          const cls = b.correct && c === b.correct ? "right" : (b.correct && c && c !== b.correct ? "wrong" : "");
          return '<td class="' + cls + '">' + esc(label(b, c)) + '</td>';
        }).join("");
        const res = settled ? '<td class="res">' + (b.correct ? esc(label(b, b.correct)) : "—") + '</td>' : '';
        return '<tr><td class="bet"><b>' + b.n + '.</b> ' + esc(b.title) + '</td>' + cells + res + '</tr>';
      }).join("");
      body = tally + '<table>' + head + rows + '</table>';
    }

    app.innerHTML = `
      <header>
        <div class="comp">${esc(m.competition)}</div>
        <div class="vs">
          <div class="team"><div class="crest psg">PSG</div><div class="tname">${esc(m.home)}</div></div>
          <div class="vstxt">v</div>
          <div class="team"><div class="crest ars">ARS</div><div class="tname">${esc(m.away)}</div></div>
        </div>
      </header>
      ${body}
      <a class="link" href="?match=${esc(SLUG)}">← Back to picks</a>`;
  }

  (params.get("view") === "results" ? renderResults : renderForm)();
</script>
</body>
</html>
